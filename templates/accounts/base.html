{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>{% block page_title %}{% endblock %}</title>
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-EVSTQN3/azprG1Anm3QDgpJLIm9Nao0Yz1ztcQTwFspd3yD65VohhpuuCOmLASjC" crossorigin="anonymous">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

    <!-- Custom CSS -->
    <link rel="stylesheet" href="{% static 'css/user_forms.css' %}">
    <link rel="stylesheet" href="{% static 'css/base.css' %}">
    <link rel="stylesheet" href="{% static 'css/layout.css' %}">
    <link rel="stylesheet" href="{% static 'css/components.css' %}">
    <link rel="stylesheet" href="{% static 'css/apps/list.css' %}">

    <link rel="icon" type="image/x-icon" href="{% static 'images/fav/favicon.ico' %}">
    <link rel="icon" type="image/png" sizes="32x32"
        href="{% static 'images/fav/favicon-32x32.png' %}">
    <link rel="apple-touch-icon"
        href="{% static 'images/fav/apple-touch-icon.png' %}">
        
    {% block css_files %}
    {% endblock %}
</head>
<body>
    
    <!-- NAVBAR -->
    {% include "partials/navbar.html" %}

    <div class="">
        {% block content %}
        {% endblock %}
    </div>

    <!-- Toast Message -->
    {% include 'partials/toasts.html' %}

    <!-- Bootstap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/js/bootstrap.bundle.min.js" integrity="sha384-MrcW6ZMFYlzcLA8Nl+NtUVF0sA7MsXsP1UyJoMp4YLEuNSfAP+JcXn/tWtIaxVXM" crossorigin="anonymous"></script>
    <script src="{% static 'js/user_forms.js' %}" ></script>
    <script src="{% static 'js/toasts.js' %}"></script>
    {% block scripts %}
    {% endblock %}
</body>
</html>
