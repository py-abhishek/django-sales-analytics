services:
  - type: web
    name: sales-analytics
    runtime: python
    buildCommand: "./build.sh"
    startCommand: "gunicorn sales_analytics.wsgi --bind 0.0.0.0:$PORT"
    envVars:
      - key: SECRET_KEY
        generateValue: true
      - key: DEBUG
        value: False
      - key: DATABASE_URL
        fromDatabase:
          name: sales-analytics-db
          property: connectionString

databases:
  - name: sales-analytics-db
    plan: free